name: 'Telegram Release Notification'

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: '–Ґ–µ–≥ —А–µ–ї–Є–Ј–∞'
        required: true
        default: 'v1.0.0'
      release_name:
        description: '–Э–∞–Ј–≤–∞–љ–Є–µ —А–µ–ї–Є–Ј–∞'
        required: true
        default: '–†–µ–ї–Є–Ј v1.0.0'
      body:
        description: '–Ю–њ–Є—Б–∞–љ–Є–µ —А–µ–ї–Є–Ј–∞ (changelog)'
        required: true
        default: |
          ## –І—В–Њ –Є–Ј–Љ–µ–љ–Є–ї–Њ—Б—М
          * –Э–Њ–≤–∞—П —Д—Г–љ–Ї—Ж–Є—П 1
          * –Э–Њ–≤–∞—П —Д—Г–љ–Ї—Ж–Є—П 2
          * –Ш—Б–њ—А–∞–≤–ї–µ–љ–Є—П –Њ—И–Є–±–Њ–Ї

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: –Я–Њ–ї—Г—З–µ–љ–Є–µ —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є—П
        uses: actions/checkout@v4

      - name: –Я–Њ–ї—Г—З–µ–љ–Є–µ –Є–љ—Д–Њ—А–Љ–∞—Ж–Є–Є –Њ —А–µ–ї–Є–Ј–µ
        id: release_info
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "name=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ github.event.release.prerelease }}" >> $GITHUB_OUTPUT
            # Escape newlines and special characters in body
            BODY=$(echo '${{ github.event.release.body }}' | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
            echo "body=$BODY" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
            echo "name=${{ github.event.inputs.release_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            BODY=$(echo '${{ github.event.inputs.body }}' | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
            echo "body=$BODY" >> $GITHUB_OUTPUT
          fi

      - name: –§–Њ—А–Љ–∞—В–Є—А–Њ–≤–∞–љ–Є–µ —Б–Њ–Њ–±—Й–µ–љ–Є—П –і–ї—П Telegram
        id: format_message
        run: |
          TAG_NAME="${{ steps.release_info.outputs.tag_name }}"
          RELEASE_NAME="${{ steps.release_info.outputs.name }}"
          PRERELEASE="${{ steps.release_info.outputs.prerelease }}"
          BODY="${{ steps.release_info.outputs.body }}"
          REPO_NAME="${{ github.repository }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          # –Ю–њ—А–µ–і–µ–ї–µ–љ–Є–µ —В–Є–њ–∞ —А–µ–ї–Є–Ј–∞ –Є —Н–Љ–Њ–і–Ј–Є
          if [ "$PRERELEASE" = "true" ]; then
            EMOJI="рЯІ™"
            RELEASE_TYPE="–Я—А–µ–і-—А–µ–ї–Є–Ј"
          else
            EMOJI="рЯЪА"
            RELEASE_TYPE="–†–µ–ї–Є–Ј"
          fi

          # –Я–Њ–ї—Г—З–µ–љ–Є–µ –Ї–Њ–Љ–Љ–Є—В–Њ–≤ –і–ї—П —А–µ–ї–Є–Ј–∞
          echo "–Я–Њ–ї—Г—З–µ–љ–Є–µ —Б–њ–Є—Б–Ї–∞ –Ї–Њ–Љ–Љ–Є—В–Њ–≤..."

          # –Я–Њ–ї—Г—З–∞–µ–Љ –њ—А–µ–і—Л–і—Г—Й–Є–є —В–µ–≥
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            # –Я–Њ–ї—Г—З–∞–µ–Љ –Ї–Њ–Љ–Љ–Є—В—Л –Љ–µ–ґ–і—Г –њ—А–µ–і—Л–і—Г—Й–Є–Љ –Є —В–µ–Ї—Г—Й–Є–Љ —В–µ–≥–Њ–Љ
            COMMITS=$(git log --pretty=format:"вАҐ %s" ${PREVIOUS_TAG}..HEAD 2>/dev/null || echo "")
          else
            # –Х—Б–ї–Є –њ—А–µ–і—Л–і—Г—Й–µ–≥–Њ —В–µ–≥–∞ –љ–µ—В, –њ–Њ–ї—Г—З–∞–µ–Љ –≤—Б–µ –Ї–Њ–Љ–Љ–Є—В—Л
            COMMITS=$(git log --pretty=format:"вАҐ %s" HEAD 2>/dev/null || echo "")
          fi

          # –Ю–≥—А–∞–љ–Є—З–Є–≤–∞–µ–Љ –Ї–Њ–ї–Є—З–µ—Б—В–≤–Њ –Ї–Њ–Љ–Љ–Є—В–Њ–≤ (–њ–Њ—Б–ї–µ–і–љ–Є–µ 100)
          if [ -n "$COMMITS" ]; then
            COMMITS=$(echo "$COMMITS" | head -100)
            COMMITS_SECTION="$COMMITS"
          else
            COMMITS_SECTION="–Э–µ—В –Є–Ј–Љ–µ–љ–µ–љ–Є–є –≤ –Ї–Њ–і–µ"
          fi

          # –§–Њ—А–Љ–∞—В–Є—А–Њ–≤–∞–љ–Є–µ —Б–Њ–Њ–±—Й–µ–љ–Є—П (–Є—Б–њ–Њ–ї—М–Ј—Г–µ–Љ plain text –±–µ–Ј Markdown)
          MESSAGE="${EMOJI} ${RELEASE_TYPE} ${TAG_NAME}\n\nрЯУ¶ –†–µ–њ–Њ–Ј–Є—В–Њ—А–Є–є: ${REPO_NAME}\n\nрЯУЛ Changelog:\n${COMMITS_SECTION}\n\nрЯФЧ –Я–Њ—Б–Љ–Њ—В—А–µ—В—М —А–µ–ї–Є–Ј: ${REPO_URL}/releases/tag/${TAG_NAME}"

          # Escape the message for JSON
          MESSAGE=$(echo "$MESSAGE" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      - name: –Ю—В–њ—А–∞–≤–Ї–∞ –≤ Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "вЭМ –°–µ–Ї—А–µ—В TELEGRAM_BOT_TOKEN –љ–µ –љ–∞–є–і–µ–љ"
            echo "–Я–Њ–ґ–∞–ї—Г–є—Б—В–∞, –і–Њ–±–∞–≤—М—В–µ —В–Њ–Ї–µ–љ Telegram –±–Њ—В–∞ –≤ —Б–µ–Ї—А–µ—В—Л —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є—П"
            exit 1
          fi

          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "вЭМ –°–µ–Ї—А–µ—В TELEGRAM_CHAT_ID –љ–µ –љ–∞–є–і–µ–љ"
            echo "–Я–Њ–ґ–∞–ї—Г–є—Б—В–∞, –і–Њ–±–∞–≤—М—В–µ ID —З–∞—В–∞/–Ї–∞–љ–∞–ї–∞ Telegram –≤ —Б–µ–Ї—А–µ—В—Л —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є—П"
            exit 1
          fi

          MESSAGE="${{ steps.format_message.outputs.message }}"

          # –Ю—В–њ—А–∞–≤–Ї–∞ —Б–Њ–Њ–±—Й–µ–љ–Є—П –≤ Telegram
          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"${MESSAGE}\",
              \"disable_web_page_preview\": false
            }")

          # –Я—А–Њ–≤–µ—А–Ї–∞ —Г—Б–њ–µ—И–љ–Њ–є –Њ—В–њ—А–∞–≤–Ї–Є —Б–Њ–Њ–±—Й–µ–љ–Є—П
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "вЬЕ –£–≤–µ–і–Њ–Љ–ї–µ–љ–Є–µ –Њ —А–µ–ї–Є–Ј–µ —Г—Б–њ–µ—И–љ–Њ –Њ—В–њ—А–∞–≤–ї–µ–љ–Њ –≤ Telegram!"
            echo "–Ю—В–≤–µ—В: $RESPONSE"
          else
            echo "вЭМ –Э–µ —Г–і–∞–ї–Њ—Б—М –Њ—В–њ—А–∞–≤–Є—В—М —Б–Њ–Њ–±—Й–µ–љ–Є–µ –≤ Telegram"
            echo "–Ю—В–≤–µ—В: $RESPONSE"
            exit 1
          fi

      - name: –Ґ–µ—Б—В–Њ–≤–Њ–µ —Б–Њ–Њ–±—Й–µ–љ–Є–µ (—В–Њ–ї—М–Ї–Њ –њ—А–Є —А—Г—З–љ–Њ–Љ –Ј–∞–њ—Г—Б–Ї–µ)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "рЯІ™ –≠—В–Њ –±—Л–ї —В–µ—Б—В–Њ–≤—Л–є –Ј–∞–њ—Г—Б–Ї, –≤—Л–њ–Њ–ї–љ–µ–љ–љ—Л–є –≤—А—Г—З–љ—Г—О"
          echo "–Т –њ—А–Њ–і–∞–Ї—И–µ–љ–µ —Н—В–Њ—В workflow –±—Г–і–µ—В –Ј–∞–њ—Г—Б–Ї–∞—В—М—Б—П –∞–≤—В–Њ–Љ–∞—В–Є—З–µ—Б–Ї–Є –њ—А–Є —Б–Њ–Ј–і–∞–љ–Є–Є —А–µ–ї–Є–Ј–∞"
